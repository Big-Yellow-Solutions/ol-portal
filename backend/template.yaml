AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: OL Portal backend — DynamoDB data layer, Lambda API, Cognito auth.

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures: [arm64]
    Timeout: 10
    MemorySize: 256

Resources:
  FilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ol-portal-files-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - https://main.d2rvkunvze2ixv.amplifyapp.com
              - http://localhost:8761
            AllowedMethods: [PUT, GET]
            AllowedHeaders: ["*"]
            MaxAge: 3600

  AnalyzerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ol-portal-analyzer
      CodeUri: src/
      Handler: analyzer.handler
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          TABLE_NAME: !Ref PortalTable
          ANTHROPIC_KEY_PARAM: /ol-portal/anthropic-api-key
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PortalTable
        - S3ReadPolicy:
            BucketName: !Sub ol-portal-files-${AWS::AccountId}
        - SSMParameterReadPolicy:
            ParameterName: ol-portal/anthropic-api-key
      Events:
        FileUploaded:
          Type: S3
          Properties:
            Bucket: !Ref FilesBucket
            Events: s3:ObjectCreated:*

  PortalTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ol-portal
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: ol-portal
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: You're invited to the Optimistic Labs Portal
          EmailMessage: >-
            Hi! You've been invited to the Optimistic Labs Portal.
            Your username is {username} and your temporary password is {####}.
            Sign in at https://main.d2rvkunvze2ixv.amplifyapp.com/login.html
            within 7 days. You'll choose your own password and set up
            two-factor authentication on first sign-in.
      AutoVerifiedAttributes: [email]
      UsernameConfiguration:
        CaseSensitive: false
      # PRD 2.3: 12+ chars, upper/lower/number required (3 character classes).
      # Cognito cannot express "any 3 of 4", so symbols stay optional.
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7
      # PRD 2.5: TOTP 2FA, mandatory for every account. Users without a token
      # get the MFA_SETUP challenge (enrollment) at next sign-in.
      MfaConfiguration: "ON"
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      # PRD 2.6: audit log of auth events, written by the post-auth trigger.
      LambdaConfig:
        PostAuthentication: !GetAtt AuthEventsFunction.Arn

  AuthEventsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthEventsFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  AuthEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ol-portal-auth-events
      CodeUri: src/
      Handler: authevents.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref PortalTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PortalTable

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: portal-web
      GenerateSecret: false
      # PRD 2.4: no account-enumeration leakage from sign-in / forgot-password.
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admin
      UserPoolId: !Ref UserPool

  LabLeaderGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: LabLeader
      UserPoolId: !Ref UserPool

  SubcontractorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Subcontractor
      UserPoolId: !Ref UserPool

  PortalApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - https://main.d2rvkunvze2ixv.amplifyapp.com
          - http://localhost:8761
        AllowMethods: [GET, POST, PATCH, DELETE, OPTIONS]
        AllowHeaders: [Authorization, Content-Type]
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient
            IdentitySource: $request.header.Authorization

  # Daily generator for recurring deal instances + opt-in auto invoice requests (PRD 3.9/3.10)
  RecurringFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ol-portal-recurring
      CodeUri: src/
      Handler: recurring.handler
      Timeout: 60
      Environment:
        Variables:
          TABLE_NAME: !Ref PortalTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PortalTable
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: cron(15 6 * * ? *)

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ol-portal-api
      CodeUri: src/
      Handler: app.handler
      # HTTP API caps responses at 29s; the AI proposal assistant needs most of it.
      Timeout: 28
      Environment:
        Variables:
          TABLE_NAME: !Ref PortalTable
          ANTHROPIC_KEY_PARAM: /ol-portal/anthropic-api-key
          FILES_BUCKET: !Ref FilesBucket
          FRONTEND_URL: https://main.d2rvkunvze2ixv.amplifyapp.com
          QBO_CREDS_PARAM: /ol-portal/qbo-credentials
          QBO_ENV: sandbox
          # Hardcoded (like the frontend's config.js): !Sub ${PortalApi} here would
          # be circular, since the HttpApi routes already reference this function.
          # Must exactly match a redirect URI registered in the Intuit dashboard.
          QBO_REDIRECT_URI: https://0y24y7945l.execute-api.us-east-1.amazonaws.com/qbo/callback
          USER_POOL_ID: !Ref UserPool
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PortalTable
        - S3CrudPolicy:
            BucketName: !Sub ol-portal-files-${AWS::AccountId}
        - SSMParameterReadPolicy:
            ParameterName: ol-portal/qbo-credentials
        - SSMParameterReadPolicy:
            ParameterName: ol-portal/anthropic-api-key
        # PRD 2.2/2.5: invite lifecycle + admin 2FA reset (admin routes only)
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminDeleteUser
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:AdminSetUserMFAPreference
                - cognito-idp:ListUsers
              Resource: !GetAtt UserPool.Arn
      Events:
        GetRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: GET
        PostRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: POST
        PatchRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: PATCH
        DeleteRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: DELETE
        # Intuit's OAuth redirect cannot carry a Cognito JWT; the handler's
        # state check (CSRF) protects this route instead.
        QboCallbackRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /qbo/callback
            Method: GET
            Auth:
              Authorizer: NONE
        # Customer-facing proposal view + decision (PRD 3.5). Clients aren't
        # portal users, so no JWT; the per-proposal share token is the credential.
        ShareGetRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /share/{proxy+}
            Method: GET
            Auth:
              Authorizer: NONE
        SharePostRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /share/{proxy+}
            Method: POST
            Auth:
              Authorizer: NONE

Outputs:
  ApiUrl:
    Value: !Sub https://${PortalApi}.execute-api.${AWS::Region}.amazonaws.com
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  TableName:
    Value: !Ref PortalTable
