AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: OL Portal backend — DynamoDB data layer, Lambda API, Cognito auth.

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures: [arm64]
    Timeout: 10
    MemorySize: 256

Resources:
  FilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ol-portal-files-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - https://main.d2rvkunvze2ixv.amplifyapp.com
              - http://localhost:8761
            AllowedMethods: [PUT, GET]
            AllowedHeaders: ["*"]
            MaxAge: 3600

  AnalyzerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ol-portal-analyzer
      CodeUri: src/
      Handler: analyzer.handler
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          TABLE_NAME: !Ref PortalTable
          ANTHROPIC_KEY_PARAM: /ol-portal/anthropic-api-key
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PortalTable
        - S3ReadPolicy:
            BucketName: !Sub ol-portal-files-${AWS::AccountId}
        - SSMParameterReadPolicy:
            ParameterName: ol-portal/anthropic-api-key
      Events:
        FileUploaded:
          Type: S3
          Properties:
            Bucket: !Ref FilesBucket
            Events: s3:ObjectCreated:*

  PortalTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ol-portal
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: ol-portal
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes: [email]
      UsernameConfiguration:
        CaseSensitive: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: portal-web
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admin
      UserPoolId: !Ref UserPool

  LabLeaderGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: LabLeader
      UserPoolId: !Ref UserPool

  SubcontractorGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Subcontractor
      UserPoolId: !Ref UserPool

  PortalApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - https://main.d2rvkunvze2ixv.amplifyapp.com
          - http://localhost:8761
        AllowMethods: [GET, POST, PATCH, DELETE, OPTIONS]
        AllowHeaders: [Authorization, Content-Type]
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient
            IdentitySource: $request.header.Authorization

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ol-portal-api
      CodeUri: src/
      Handler: app.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref PortalTable
          FILES_BUCKET: !Ref FilesBucket
          FRONTEND_URL: https://main.d2rvkunvze2ixv.amplifyapp.com
          QBO_CREDS_PARAM: /ol-portal/qbo-credentials
          QBO_ENV: sandbox
          # Hardcoded (like the frontend's config.js): !Sub ${PortalApi} here would
          # be circular, since the HttpApi routes already reference this function.
          # Must exactly match a redirect URI registered in the Intuit dashboard.
          QBO_REDIRECT_URI: https://0y24y7945l.execute-api.us-east-1.amazonaws.com/qbo/callback
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PortalTable
        - S3CrudPolicy:
            BucketName: !Sub ol-portal-files-${AWS::AccountId}
        - SSMParameterReadPolicy:
            ParameterName: ol-portal/qbo-credentials
      Events:
        GetRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: GET
        PostRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: POST
        PatchRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: PATCH
        DeleteRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /{proxy+}
            Method: DELETE
        # Intuit's OAuth redirect cannot carry a Cognito JWT; the handler's
        # state check (CSRF) protects this route instead.
        QboCallbackRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref PortalApi
            Path: /qbo/callback
            Method: GET
            Auth:
              Authorizer: NONE

Outputs:
  ApiUrl:
    Value: !Sub https://${PortalApi}.execute-api.${AWS::Region}.amazonaws.com
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  TableName:
    Value: !Ref PortalTable
